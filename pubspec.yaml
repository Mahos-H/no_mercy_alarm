name: no_mercy_alarm
description: A no-snooze alarm app with password protection
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Alarm and notification management
  android_alarm_manager_plus: ^5.0.0
  flutter_local_notifications: ^21.0.0
  
  # Audio playback
  audioplayers: ^6.0.0
  
  # File picking
  file_picker: ^10.3.10
  
  # State management and storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  
  # Permissions
  permission_handler: ^12.0.1
  
  # UI
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  #assets:
  #  - assets/sounds/
    
  # Default alarm sounds (you'll need to add these)
  # Place MP3 files in assets/sounds/ folder